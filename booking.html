<!DOCTYPE html>
<html>
<head>
  <title>Bus Booking</title>
  <link rel="stylesheet" href="booking.css">
</head>
<body>

<div class="container">
  <h2>Book Your Ticket</h2>

  <form action="confirm.html" method="GET">
    <input type="text" name="name" placeholder="Name" required>
    <input type="text" name="mobile" placeholder="Mobile" required>
    <input type="email" name="email" placeholder="Email" required>

    <input type="text" name="from" placeholder="From City">
    <input type="text" name="to" placeholder="To City">

    <select name="busType" id="busType">
      <option value="Non-AC Seater">Non-AC Seater</option>
      <option value="AC Seater">AC Seater</option>
      <option value="Non-AC Sleeper">Non-AC Sleeper</option>
      <option value="AC Sleeper">AC Sleeper</option>
      <option value="Deluxe Non-AC">Deluxe Non-AC</option>
      <option value="Deluxe AC">Deluxe AC</option>
    </select>

    <input type="number" name="seats" id="seats" placeholder="Seats">

    <p>Remaining Seats: <span id="remaining">40</span></p>

    <h3>Total Price: ₹<span id="price">0</span></h3>
     <input type="datetime-local" name="travelDateTime" id="travelDateTime" required>
    <select name="payment">
      <option>UPI</option>
      <option>Card</option>
      <option>Net Banking</option>
    </select>

    <button type="submit">Pay Now</button>
  </form>
</div>

<script src="booking.js"></script>

</body>
</html>
